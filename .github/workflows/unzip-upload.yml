name: Unzip uploaded site

on:
  push:
    branches:
      - main
    paths:
      - "*.zip"
      - "uploads/*.zip"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find and extract uploaded zip
        id: extract
        run: |
          set -e
          shopt -s nullglob
          zips=(*.zip uploads/*.zip)
          if [ ${#zips[@]} -eq 0 ]; then
            echo "No zip file found, nothing to do."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          zip_file="${zips[0]}"
          echo "Extracting $zip_file"
          tmp=$(mktemp -d)
          unzip -oq "$zip_file" -d "$tmp"

          # If the zip wraps everything in one top-level folder, use its contents instead
          entries=("$tmp"/*)
          if [ ${#entries[@]} -eq 1 ] && [ -d "${entries[0]}" ]; then
            src="${entries[0]}"
          else
            src="$tmp"
          fi

          # Replace all site files, keep .git and .github (workflows) untouched
          find . -maxdepth 1 -mindepth 1 ! -name '.git' ! -name '.github' -exec rm -rf {} +
          cp -r "$src"/. .
          rm -f "$zip_file"
          rm -rf "$tmp" "uploads"
          echo "found=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push updated site
        if: steps.extract.outputs.found == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes after extraction, nothing to commit."
            exit 0
          fi
          git commit -m "Auto-update site from uploaded ZIP"
          git push
